{% extends "base.html" %}

{% block head %}{% endblock head %}


{% block content %}

<h1>All Authors</h1>
    {% for author in authors  %}
        <p>name: {{author.first_name}} {{author.last_name}}</p>

        {% empty %}
        <p>No authors yet</p>
    {% endfor %}

{% endblock content %}
